name: jyotish_ai
description: Vedic & Tamil Astrology - AI powered predictions.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Network
  dio: ^5.4.3+1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^13.2.4

  # DI
  get_it: ^7.7.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
