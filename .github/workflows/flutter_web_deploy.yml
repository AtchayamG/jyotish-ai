name: Flutter Web — Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # change to master if your default branch is master
      - master
  workflow_dispatch:  # allow manual trigger from GitHub UI

# Grant GITHUB_TOKEN permission to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Flutter ────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'   # pin to stable version
          channel: 'stable'
          cache: true

      # ── 3. Get dependencies ─────────────────────────────────────────────────
      - name: Flutter pub get
        working-directory: flutter_app   # adjust if your flutter project is in root
        run: flutter pub get

      # ── 4. Add web support if missing ───────────────────────────────────────
      - name: Enable web
        working-directory: flutter_app
        run: flutter create . --platforms web --project-name jyotish_ai

      # ── 5. Build web release ─────────────────────────────────────────────────
      # base-href must match your GitHub Pages URL path
      # If repo name is jyotish-ai → base-href is /jyotish-ai/
      # If deploying to custom domain → use /
      - name: Build Flutter web
        working-directory: flutter_app
        run: |
          flutter build web \
            --release \
            --base-href /jyotish-ai/ \
            --dart-define=BACKEND_URL=https://jyotish-ai-backend.onrender.com

      # ── 6. Setup GitHub Pages ────────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # ── 7. Upload build output ──────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: flutter_app/build/web

      # ── 8. Deploy to GitHub Pages ────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
